<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method B Issue Generator</title>
<style>
  :root { --bg: #f8f9fa; --card: #fff; --border: #dee2e6; --accent: #0969da; --text: #1f2328; --danger: #cf222e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 1rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  .desc { color: #656d76; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1rem; position: relative; }
  label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
  input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; font-family: inherit; margin-bottom: 1rem; }
  textarea { min-height: 160px; resize: vertical; }
  .row { display: flex; gap: 1rem; }
  .row > div { flex: 1; }
  .sub-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--accent); }
  .condition-row { display: flex; gap: 0.5rem; margin-bottom: 0.3rem; align-items: center; }
  .condition-row input { flex: 1; margin-bottom: 0; }
  .btn-del-cond { background: none; border: none; color: #999; cursor: pointer; font-size: 1rem; padding: 0 0.3rem; }
  .btn-del-cond:hover { color: var(--danger); }
  .btn { display: inline-block; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #0860c4; }
  .btn-secondary { background: #eee; color: var(--text); margin-left: 0.5rem; }
  .btn-secondary:hover { background: #ddd; }
  .btn-save { background: #2da44e; color: #fff; margin-left: 0.5rem; }
  .btn-save:hover { background: #298e46; }
  .btn-add { background: none; border: 1px dashed var(--border); color: #656d76; padding: 0.3rem 0.8rem; font-size: 0.8rem; cursor: pointer; margin-bottom: 1rem; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none; color: #999; cursor: pointer; font-size: 1.1rem; }
  .btn-remove:hover { color: var(--danger); }
  .output-area { background: #f6f8fa; border: 1px solid var(--border); border-radius: 4px; padding: 1rem; white-space: pre-wrap; font-family: 'SF Mono', Consolas, monospace; font-size: 0.82rem; line-height: 1.5; max-height: 500px; overflow-y: auto; user-select: all; }
  .status { padding: 0.5rem; border-radius: 4px; margin-top: 0.5rem; font-size: 0.85rem; display: none; }
  .status.ok { display: block; background: #dafbe1; color: #1a7f37; }
  .status.err { display: block; background: #ffebe9; color: var(--danger); }
  .help { color: #656d76; font-size: 0.75rem; margin-top: -0.7rem; margin-bottom: 0.8rem; }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 0.3rem 1rem; margin-bottom: 1rem; }
  .cat-grid label { display: inline-flex; align-items: center; gap: 0.3rem; font-weight: 400; font-size: 0.85rem; cursor: pointer; }
  .cat-grid input[type="checkbox"] { width: auto; margin: 0; }
  .separator-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; padding: 0.4rem 0.6rem; background: #fff8c5; border-radius: 4px; font-size: 0.82rem; }
  .separator-row input[type="checkbox"] { width: auto; margin: 0; }
  .separator-row label { font-weight: 400; margin: 0; font-size: 0.82rem; }
  .sample-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
  .sample-bar select { width: auto; min-width: 200px; margin: 0; }
  .sample-bar label { margin: 0; white-space: nowrap; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
  .char-count { color: #656d76; font-size: 0.75rem; text-align: right; margin-top: -0.8rem; margin-bottom: 0.8rem; }
</style>
</head>
<body>

<h1>📝 Method B Issue Generator</h1>
<p class="desc">Fill in issue fields to generate markdown for <code>issue_open.md</code>.</p>

<div class="card">
  <div class="sample-bar">
    <label for="sample-select">📋 Sample:</label>
    <select id="sample-select">
      <option value="">(Start with empty form)</option>
      <option value="verify">Sample 1: Verify Component Ordering</option>
      <option value="research">Sample 2: Paper Introduction Directions</option>
      <option value="ninv">Sample 3: Verify n-Invariance</option>
    </select>
    <button class="btn btn-secondary" onclick="loadSample()" style="margin:0; padding:0.4rem 0.8rem; font-size:0.82rem;">Load</button>
  </div>

  <div class="row">
    <div>
      <label for="created">Created</label>
      <input type="date" id="created">
    </div>
    <div>
      <label>Category (multiple selection)</label>
      <div class="cat-grid" id="cat-grid">
        <label><input type="checkbox" value="verification"> verification</label>
        <label><input type="checkbox" value="research"> research</label>
        <label><input type="checkbox" value="proposal"> proposal</label>
        <label><input type="checkbox" value="implementation"> implementation</label>
        <label><input type="checkbox" value="paper"> paper</label>
        <label><input type="checkbox" value="docs"> docs</label>
        <label><input type="checkbox" value="workflow"> workflow</label>
      </div>
    </div>
  </div>
</div>

<div id="issues-container"></div>

<button class="btn-add" onclick="addIssue()">+ Add sub-issue</button>

<div class="toolbar">
  <button class="btn btn-primary" onclick="generate()">Generate</button>
  <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy to clipboard</button>
  <button class="btn btn-save" onclick="saveAsFile()">💾 Save as file</button>
  <button class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
</div>

<div id="status" class="status"></div>

<div class="card" style="margin-top:1rem;">
  <label>Output preview <span id="output-chars" class="char-count" style="display:inline; margin:0;"></span></label>
  <div id="output" class="output-area">(Output will appear here)</div>
</div>

<script>
let issueCount = 0;

const SAMPLES = {
  verify: {
    category: ['verification'],
    issues: [{
      nn: '', sub: '1', title: 'Verify Component Ordering in Proposition 3.5',
      bg: '- Proposition 3.5 in `docs/theory/triviality_B0n.tex` lists component ordering\n- Verification script `scripts/verify_proposition.py` is available\n- Section 3 rewrite may have changed the component ordering',
      req: '- Confirm the component ordering in Proposition 3.5 matches the definition of δ (Eq. 3.2)\n- Run the verification script and check all components pass\n- If mismatches are found, identify the correct ordering',
      artifact: 'Document', files: 'docs/theory/, scripts/', related: '',
      conds: ['Component ordering of Proposition 3.5 and Eq. 3.2 are compared', 'Verification script runs without errors', 'All components confirmed to match (or corrections proposed)']
    }]
  },
  research: {
    category: ['research'],
    issues: [{
      nn: '', sub: '1', title: 'Direction Candidates for Paper Introduction',
      bg: '- The English paper `docs/theory/triviality_B0n.tex` currently lacks an Introduction section\n- The paper builds on Bakalov–Sullivan (arXiv:1612.09400v2) and needs positioning within the context of deformation theory for Lie superalgebras',
      req: '- Present multiple candidates for the Introduction content\n- For each candidate, specify the structure outline and advantages',
      artifact: 'Document', files: 'docs/theory/', related: '',
      conds: ['At least 3 direction candidates are presented', 'Each candidate has a structure outline and stated advantages', 'A recommended candidate is specified']
    }]
  },
  ninv: {
    category: ['verification'],
    issues: [{
      nn: '', sub: '1', title: 'Verify n-Invariance of Family I/II Certificates',
      bg: '- According to `docs/theory/triviality_certificates.md`, the triviality certificates for Families I and II satisfy an n-invariance property\n- The code repository provides `scripts/verify_n_invariance.py` for checking this property\n- If n-invariance holds, a single certificate verified for small n proves the result for all n',
      req: '- Read the n-invariance claim in the documentation\n- Run `scripts/verify_n_invariance.py` for B(0,1) through B(0,3) and confirm certificates match across ranks\n- Summarize which families and weight types are covered',
      artifact: 'Document', files: 'docs/theory/, scripts/', related: 'I1',
      conds: ['n-invariance property confirmed for Family I', 'n-invariance property confirmed for Family II', 'Results for B(0,1), B(0,2), B(0,3) compared and reported']
    }]
  }
};

function addIssue(data) {
  issueCount++;
  const n = issueCount;
  const d = data || {};
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `issue-${n}`;

  const showSep = n > 1;
  const sepChecked = d.separator ? 'checked' : '';

  div.innerHTML = `
    ${n > 1 ? `<button class="btn-remove" onclick="removeIssue(${n})" title="Remove this sub-issue">✕</button>` : ''}
    <div class="sub-title">Sub-issue #${n}</div>
    ${showSep ? `
    <div class="separator-row">
      <input type="checkbox" id="sep-${n}" ${sepChecked}>
      <label for="sep-${n}">Insert separator <code>---</code> before this sub-issue (treat as separate issue)</label>
    </div>` : ''}
    <div class="row">
      <div style="flex:0 0 100px;">
        <label>Number (NN)</label>
        <input type="text" id="nn-${n}" placeholder="18" value="${d.nn || ''}" style="width:100%;">
      </div>
      <div style="flex:0 0 60px;">
        <label>Sub #</label>
        <input type="text" id="sub-${n}" value="${d.sub || n}" style="width:100%;">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="title-${n}" placeholder="e.g.: Workflow improvement proposal" value="${esc(d.title || '')}">
      </div>
    </div>
    <label>Background</label>
    <textarea id="bg-${n}" placeholder="Motivation and context for this issue">${esc(d.bg || '')}</textarea>
    <label>Requirements</label>
    <textarea id="req-${n}" placeholder="Specific tasks to perform">${esc(d.req || '')}</textarea>
    <label>Deliverable type</label>
    <input type="text" id="artifact-${n}" placeholder="Document / Schema / Code / Judgment / Script" value="${esc(d.artifact || '')}">
    <label>Related folders/files</label>
    <input type="text" id="files-${n}" placeholder="e.g.: docs/schema/, memo/" value="${esc(d.files || '')}">
    <label>Related issues</label>
    <input type="text" id="related-${n}" placeholder="e.g.: I07-3 (leave blank if none)" value="${esc(d.related || '')}">
    <label>Completion criteria</label>
    <div id="conds-${n}"></div>
    <button class="btn-add" onclick="addCondition(${n})" style="margin-top:0.3rem;">+ Add condition</button>
  `;
  document.getElementById('issues-container').appendChild(div);

  const conds = d.conds && d.conds.length > 0 ? d.conds : ['', ''];
  conds.forEach(c => addCondition(n, c));
}

function removeIssue(n) {
  const el = document.getElementById(`issue-${n}`);
  if (el) el.remove();
}

function addCondition(n, value) {
  const row = document.createElement('div');
  row.className = 'condition-row';
  row.innerHTML = `<input type="text" placeholder="Condition" value="${esc(value || '')}"><button class="btn-del-cond" onclick="this.parentElement.remove()" title="Delete">✕</button>`;
  document.getElementById(`conds-${n}`).appendChild(row);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getCategories() {
  return Array.from(document.querySelectorAll('#cat-grid input:checked')).map(c => c.value);
}

function setCategories(cats) {
  document.querySelectorAll('#cat-grid input').forEach(c => { c.checked = cats.includes(c.value); });
}

function generate() {
  const created = document.getElementById('created').value || '';
  const cats = getCategories();
  let lines = [];

  let lastSepGroup = false;

  const issueEls = document.querySelectorAll('[id^="issue-"]');
  let firstInGroup = true;

  issueEls.forEach((el, idx) => {
    const n = el.id.replace('issue-', '');
    const nn = document.getElementById(`nn-${n}`)?.value.trim() || '';
    const sub = document.getElementById(`sub-${n}`)?.value.trim() || '';
    const title = document.getElementById(`title-${n}`)?.value.trim() || '';
    const bg = document.getElementById(`bg-${n}`)?.value.trim() || '';
    const req = document.getElementById(`req-${n}`)?.value.trim() || '';
    const artifact = document.getElementById(`artifact-${n}`)?.value.trim() || '';
    const files = document.getElementById(`files-${n}`)?.value.trim() || '';
    const related = document.getElementById(`related-${n}`)?.value.trim() || '';
    const sepEl = document.getElementById(`sep-${n}`);
    const hasSep = sepEl ? sepEl.checked : false;

    if (hasSep && idx > 0) {
      lines.push('');
      lines.push('---');
      lines.push('');
      lines.push(`Created: ${created}`);
      lines.push(`Category: ${cats.join(', ') || ''}`);
      lines.push('');
    } else if (idx === 0) {
      lines.push(`Created: ${created}`);
      lines.push(`Category: ${cats.join(', ') || ''}`);
      lines.push('');
    } else {
      lines.push('');
    }

    lines.push(`## I${nn}-${sub}. ${title || '{Title}'}`);
    lines.push('');
    lines.push('### Background');
    lines.push('');
    lines.push(bg || '{Background}');
    lines.push('');
    lines.push('### Requirements');
    lines.push('');
    lines.push(req || '{Requirements}');
    lines.push('');
    lines.push('### Supplementary Information');
    lines.push('');
    lines.push('#### Deliverable Type');
    lines.push('');
    lines.push(artifact || '{Document / Schema / Code / Judgment / Script}');
    lines.push('');
    lines.push('#### Related Folders/Files');
    lines.push('');
    if (files) {
      files.split(',').forEach(f => lines.push(`- ${f.trim()}`));
    } else {
      lines.push('- {e.g.: docs/schema/}');
    }
    lines.push('');
    lines.push('#### Related Issues');
    lines.push('');
    lines.push(related || 'None');
    lines.push('');
    lines.push('### Completion Criteria');
    lines.push('');

    const conds = document.querySelectorAll(`#conds-${n} input`);
    let hasAny = false;
    conds.forEach(c => {
      const v = c.value.trim();
      if (v) { lines.push(`- [ ] ${v}`); hasAny = true; }
    });
    if (!hasAny) lines.push('- [ ] {Condition 1}');
  });

  const result = lines.join('\n') + '\n';
  document.getElementById('output').textContent = result;
  document.getElementById('output-chars').textContent = `(${result.length} chars)`;
  showStatus('ok', 'Generated — check the preview below');
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  if (!text || text.startsWith('(Output')) {
    showStatus('err', 'Please click "Generate" first');
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showStatus('ok', 'Copied to clipboard');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const el = document.getElementById('output');
  const range = document.createRange();
  range.selectNodeContents(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  showStatus('ok', 'Text selected — copy with Cmd+C / Ctrl+C');
}

function saveAsFile() {
  const text = document.getElementById('output').textContent;
  if (!text || text.startsWith('(Output')) {
    showStatus('err', 'Please click "Generate" first');
    return;
  }
  const defaultName = `issue_open_${new Date().toISOString().slice(0,10)}.md`;
  const fileName = prompt('Enter file name:', defaultName);
  if (!fileName) return;

  const blob = new Blob([text], { type: 'text/markdown; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus('ok', `"${fileName}" saved`);
}

function loadSample() {
  const key = document.getElementById('sample-select').value;
  if (!key) {
    resetForm();
    return;
  }
  const sample = SAMPLES[key];
  if (!sample) return;

  document.getElementById('issues-container').innerHTML = '';
  issueCount = 0;
  setCategories(sample.category || []);
  sample.issues.forEach(d => addIssue(d));
  document.getElementById('output').textContent = '(Output will appear here)';
  document.getElementById('output-chars').textContent = '';
  showStatus('ok', `Sample "${document.getElementById('sample-select').selectedOptions[0].text}" loaded`);
}

function resetForm() {
  document.getElementById('created').value = new Date().toISOString().slice(0, 10);
  setCategories([]);
  document.getElementById('issues-container').innerHTML = '';
  document.getElementById('output').textContent = '(Output will appear here)';
  document.getElementById('output-chars').textContent = '';
  document.getElementById('status').className = 'status';
  document.getElementById('sample-select').value = '';
  issueCount = 0;
  addIssue();
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = `status ${type}`;
  el.textContent = msg;
  setTimeout(() => { el.className = 'status'; }, 4000);
}

// Initialize
document.getElementById('created').value = new Date().toISOString().slice(0, 10);
addIssue();
</script>
</body>
</html>
